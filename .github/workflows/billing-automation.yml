name: Update Billing Dashboard

on:
  schedule:
    # Run every 4 hours
    - cron: '0 */4 * * *'
  workflow_dispatch: # Allows manual trigger

permissions:
  id-token: write
  contents: write

jobs:
  update-billing:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Generate CFO Billing Report
        shell: pwsh
        run: |
          cd scripts
          # Note: The script internally adds and commits to git
          ./Generate-CfoBillingReport.ps1
